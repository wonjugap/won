<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>원주시 주소 완벽 분석기 (API형)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 40px; background: #f1f5f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; margin: 20px 0; display: none; }
        .progress-inner { height: 100%; background: #3b82f6; width: 0%; border-radius: 5px; transition: 0.3s; }
        #status { font-size: 0.9em; color: #64748b; margin-top: 10px; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>주소 기반 지역(동) 정밀 추출</h2>
    <p>카카오 주소 API를 사용하여 여러 동을 지나는 도로명도 완벽하게 분류합니다.</p>
    
    <input type="file" id="excelFile" accept=".xlsx, .xls" />
<p> </p>
<p> </p>
    <button onclick="processWithAPI()">분석 시작 및 엑셀 다운로드</button>
    
    <div class="progress-bar" id="progressBar"><div class="progress-inner" id="progressInner"></div></div>
    <div id="status"></div>
</div>

<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
// 카카오 API를 활용한 동 추출 함수 (비동기 처리)
async function getRegionFromAPI(address) {
    return new Promise((resolve) => {
        const geocoder = new window.daum.Postcode({
            oncomplete: function(data) {
                // bname: 법정동 (예: 태장동), hname: 행정동
                resolve(data.bname || data.hname || "분석실패");
            },
            onclose: function() { resolve("분석불가"); }
        });
        // 주소 검색창을 띄우지 않고 내부 로직으로 검색 (카카오 가이드 참고)
        // 여기서는 데이터가 많을 경우를 대비해 직접 검색 API를 호출하는 방식으로 설명드립니다.
    });
}

// 주소 텍스트만으로 좌표/지번 정보를 가져오는 REST API 방식이 대량 처리에 적합합니다.
async function fetchAddress(fullAddress) {
    const API_KEY = 'YOUR_REST_API_KEY'; // 발급받으신 REST API 키
    if (!fullAddress || String(fullAddress).trim() === "") return "주소없음";

    // 1. 주소 정제: 괄호 내용 제거 및 상세주소 절삭
    // 예: "강원도 원주시 우무개로 21-8 (태장동), 301호" -> "강원도 원주시 우무개로 21-8"
    let searchAddress = String(fullAddress)
        .replace(/\(.*\)/g, '')   // 괄호와 그 안의 내용 삭제
        .split(',')[0]            // 쉼표 뒤 상세주소 삭제
        .replace(/\s\d+호.*$/, '') // 숫자+호로 끝나는 부분 삭제
        .trim();

    try {
        const response = await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(searchAddress)}`, {
            headers: { 'Authorization': `KakaoAK ${API_KEY}` }
        });
        
        const result = await response.json();

        // [디버깅] API가 실제로 어떤 데이터를 주는지 콘솔에 출력 (F12에서 확인 가능)
        console.log(`검색어: ${searchAddress}`, result);

        if (result.documents && result.documents.length > 0) {
            const doc = result.documents[0];
            
            // 법정동/행정동 정보를 순차적으로 탐색
            let region = "";
            
            if (doc.address) {
                region = doc.address.region_3depth_name;
            } else if (doc.road_address) {
                region = doc.road_address.region_3depth_name || doc.road_address.h_name;
            }

            // 만약 위에서도 못 찾았다면 전체 주소명에서 마지막 '동/읍/면' 추출
            if (!region && doc.address_name) {
                const parts = doc.address_name.split(' ');
                region = parts.find(p => p.endsWith('동') || p.endsWith('읍') || p.endsWith('면')) || "";
            }

            return region || "분류불가";
        }
        
        // 검색 결과가 아예 없을 때: 주소를 더 짧게 줄여서 재시도 (시/군/구 + 도로명까지만)
        const shorter = searchAddress.split(' ').slice(0, 4).join(' ');
        if (shorter !== searchAddress) {
            return await fetchAddress(shorter);
        }

        return "검색결과없음";
    } catch (e) {
        console.error("API 호출 중 오류 발생:", e);
        return "연결오류";
    }
}

async function processWithAPI() {
    const file = document.getElementById('excelFile').files[0];
    if (!file) return alert("파일을 선택하세요.");
    
    const reader = new FileReader();
    reader.onload = async function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        let jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        
        const progressBar = document.getElementById('progressBar');
        const progressInner = document.getElementById('progressInner');
        const status = document.getElementById('status');
        
        progressBar.style.display = 'block';
        
        for(let i=0; i<jsonData.length; i++) {
            const addrKey = Object.keys(jsonData[i]).find(k => k.includes('주소'));
            const address = jsonData[i][addrKey];
            
            // API 호출 (실제 활용 시 REST API 키 사용 권장)
            jsonData[i]['지역'] = await fetchAddress(address);
            
            let percent = Math.round(((i + 1) / jsonData.length) * 100);
            progressInner.style.width = percent + '%';
            status.innerText = `진행 중: ${i+1} / ${jsonData.length} 건 분석 완료...`;
        }

        const newSheet = XLSX.utils.json_to_sheet(jsonData);
        const newWorkbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(newWorkbook, newSheet, "결과");
        XLSX.writeFile(newWorkbook, "원주시_API정밀분석.xlsx");
        status.innerText = "분석 완료 및 다운로드 시작!";
    };
    reader.readAsArrayBuffer(file);
}
</script>
</body>
</html>

<<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>원주시 주소 완벽 분석기 (최종)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 40px; background: #f1f5f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; margin: 20px 0; display: none; }
        .progress-inner { height: 100%; background: #3b82f6; width: 0%; border-radius: 5px; transition: 0.3s; }
        #status { font-size: 0.9em; color: #64748b; margin-top: 10px; white-space: pre-wrap; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 원주시 주소 정밀 분석 도구</h2>
    <p>도로명만 있는 주소도 건물번호를 대조하여 정확한 '동'을 찾아냅니다.</p>
    
    <input type="file" id="excelFile" accept=".xlsx, .xls" />
    <div style="margin: 20px 0;">
        <button onclick="processWithAPI()">분석 시작 및 엑셀 다운로드</button>
    </div>
    
    <div class="progress-bar" id="progressBar"><div class="progress-inner" id="progressInner"></div></div>
    <div id="status">파일을 선택하고 분석 버튼을 눌러주세요.</div>
</div>

<script>
/**
 * 카카오 REST API를 이용한 주소 검색 함수
 */
async function fetchAddress(fullAddress) {
    const API_KEY = '022b581c7875a4bf792c86cf256eb49d'; 
    if (!fullAddress || String(fullAddress).trim() === "") return "주소없음";

    // 검색어 정제: 괄호 및 상세주소 제거
    let searchAddress = String(fullAddress)
        .replace(/\(.*\)/g, '')   
        .split(',')[0]            
        .replace(/[:]/g, ' ')      
        .replace(/\s\d+호.*$/, '') 
        .trim();

    try {
        const response = await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(searchAddress)}`, {
            headers: { 'Authorization': `KakaoAK ${API_KEY}` }
        });
        
        const result = await response.json();

        // [중요] 권한 오류 체크 (API 활성화 여부)
        if (result.errorType === "NotAuthorizedError") {
            return "권한오류(API활성화필요)";
        }

        if (result.documents && result.documents.length > 0) {
            const doc = result.documents[0];
            let region = "";
            
            // 지번 주소 우선 확인
            if (doc.address) {
                region = doc.address.region_3depth_name;
            } 
            // 도로명 주소 확인
            else if (doc.road_address) {
                region = doc.road_address.region_3depth_name || doc.road_address.h_name;
            }

            // 직접 읍면동 추출 시도
            if (!region && doc.address_name) {
                const parts = doc.address_name.split(' ');
                region = parts.find(p => p.endsWith('동') || p.endsWith('읍') || p.endsWith('면')) || "";
            }

            return region || "분류불가";
        }
        
        // 검색 실패 시 재시도 (주소를 앞부분만 잘라서 다시 확인)
        const shorter = searchAddress.split(' ').slice(0, 4).join(' ');
        if (shorter !== searchAddress && shorter.length > 5) {
            return await fetchAddress(shorter);
        }

        return "검색결과없음";
    } catch (e) {
        console.error("API 호출 중 오류:", e);
        return "연결오류";
    }
}

/**
 * 엑셀 처리 루프
 */
async function processWithAPI() {
    const fileInput = document.getElementById('excelFile');
    if (!fileInput.files[0]) return alert("파일을 선택하세요.");
    
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressInner = document.getElementById('progressInner');
    
    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            let jsonData = XLSX.utils.sheet_to_json(firstSheet);
            
            progressBar.style.display = 'block';
            status.innerText = "분석 중...";
            
            for(let i = 0; i < jsonData.length; i++) {
                // 주소 열 찾기
                const addrKey = Object.keys(jsonData[i]).find(k => k.includes('주소'));
                if (addrKey) {
                    jsonData[i]['지역(분석)'] = await fetchAddress(jsonData[i][addrKey]);
                }
                
                // 진행률 업데이트
                let percent = Math.round(((i + 1) / jsonData.length) * 100);
                progressInner.style.width = percent + '%';
                status.innerText = `진행률: ${percent}% (${i + 1} / ${jsonData.length} 건 완료)`;
            }

            // 결과 저장 및 다운로드
            const newSheet = XLSX.utils.json_to_sheet(jsonData);
            const newWorkbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(newWorkbook, newSheet, "결과");
            XLSX.writeFile(newWorkbook, "원주시_지역분류_결과.xlsx");
            
            status.innerText = "✅ 분석 완료! 파일이 생성되었습니다.";
        } catch (err) {
            status.innerText = "❌ 오류: " + err.message;
        }
    };
    reader.readAsArrayBuffer(fileInput.files[0]);
}
</script>

</body>
</html>
